# Use Microsoft OpenJDK 17 (vendored at C:\Program Files\Microsoft\jdk-*).
# JetBrains Runtime 21 (Android Studio's bundled JDK) hits a known
# AF_UNIX loopback bug on Windows 11:
#   java.io.IOException: Unable to establish loopback connection
#   Caused by: java.net.SocketException: Invalid argument: connect
#     at java.base/sun.nio.ch.UnixDomainSockets.connect0
# MS OpenJDK 17 is the AGP 8.x recommended runtime and avoids this.
# Forward-slashes are required even on Windows for this property.
org.gradle.java.home=C:/Program Files/Microsoft/jdk-17.0.19.10-hotspot

org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# Keep AndroidX enabled (required by Flutter)
android.useAndroidX=true

# Avoid Java module reflection warnings on JDK 17
org.gradle.warning.mode=summary
