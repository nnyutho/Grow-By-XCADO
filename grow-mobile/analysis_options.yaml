include: package:flutter_lints/flutter.yaml

linter:
  rules:
    avoid_print: true
    # Stylistic rules disabled — too noisy for the scaffold; re-enable
    # after a `dart format .` pass when the codebase stabilises.
    require_trailing_commas: false
    prefer_const_constructors: false
    prefer_const_literals_to_create_immutables: false

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "build/**"
