name: Android APK build

# Builds an unsigned debug + release APK for the grow-mobile Flutter app
# every time grow-mobile/ changes (or on manual trigger). Uploads both
# APKs as workflow artifacts so you can download + sideload from the
# Actions tab without needing a working local Android toolchain.
#
# Once you generate a signing keystore, set these repository secrets to
# enable signed release builds (delete or comment-out the unsigned
# release step below):
#   ANDROID_KEYSTORE_BASE64   base64-encoded contents of upload.jks
#   ANDROID_KEYSTORE_PASSWORD
#   ANDROID_KEY_ALIAS
#   ANDROID_KEY_PASSWORD

on:
  push:
    branches: [main]
    paths:
      - 'grow-mobile/**'
      - '.github/workflows/android-build.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build APK on Ubuntu
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: grow-mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Build release APK (unsigned)
        run: flutter build apk --release

      - name: Build release App Bundle (unsigned)
        run: flutter build appbundle --release

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: grow-mobile-debug-apk
          path: grow-mobile/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

      - name: Upload release APK (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: grow-mobile-release-apk-unsigned
          path: grow-mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload release App Bundle (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: grow-mobile-release-aab-unsigned
          path: grow-mobile/build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Build summary
        if: always()
        run: |
          echo "## Build summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Artifacts produced:" >> $GITHUB_STEP_SUMMARY
          ls -lh build/app/outputs/flutter-apk/ build/app/outputs/bundle/release/ 2>/dev/null | awk '{print "- `" $NF "` " $5}' >> $GITHUB_STEP_SUMMARY || true
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download from the **Artifacts** section at the top of this run." >> $GITHUB_STEP_SUMMARY
          echo "Sideload to a connected Android device with:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo 'adb install -r app-release.apk' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
